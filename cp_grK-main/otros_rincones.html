<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Otros Rincones - VIAJA LIBRE</title>
    <link rel="stylesheet" href="style/otros_rincones.css">
</head>
<body>
    <header>
        <nav>
            <div class="contenedor-logo">
                <a href="#" class="brand" id="home-link" style="text-decoration: none; color: inherit;">
                    <h1>VIAJA LIBRE</h1>
                    <p class="eslogan" id="welcome-message">¡Bienvenido!</p>
                </a>
                <a href="#" class="logo-placeholder" id="logo-vl-link" style="text-decoration: none; color: white;">VL</a>
            </div>
            <div class="header-right">
                <a href="#" class="back-link">Volver</a>
                <div class="language-selector">
                    <button class="lang-btn active" id="lang-es">ES</button>
                    <button class="lang-btn" id="lang-en">EN</button>
                </div>
                <button class="accessibility-btn" id="colorblind-btn" onclick="toggleColorblind()" title="Modo Daltónico">OO</button>
            </div>
        </nav>
    </header>

    <main>
        <div class="content-wrapper">
            <div class="main-layout">
                <div class="left-content">
                    <h2 id="list-title">Lista de ciudades</h2>
                    <div class="cities-container">
                        <div class="cities-list" id="cities-list"></div>
                    </div>
                </div>
                <div class="filters">
                    <div class="filter-group">
                        <select id="filter-pais">
                            <option value="">Filtrar por países</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <select id="filter-continente">
                            <option value="">Filtrar por continentes</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="faq.html">Preguntas frecuentes</a>
            <a href="contacto.html" >Contacto</a>
            <a href="documentacion.html">Documentación</a>
        </div>
    </footer>

    <!-- Modal para detalles de ciudad -->
    <div id="city-modal" class="modal">
        <div class="modal-content">
            <span class="modal-close">&times;</span>
            <img id="modal-image" src="." alt=".">
            <h2 id="modal-title" aria-label="Título de la ciudad">Ciudad</h2>
            <p id="modal-country"></p>
            <p id="modal-description"></p>
        </div>
    </div>

    <script src="script/ciudades-data.js"></script>
    <script src="script/otros_rincones.js"></script>
</body>
</html>
