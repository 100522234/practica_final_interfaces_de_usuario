<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Foro - VIAJA LIBRE</title>
    <link rel="stylesheet" href="style/foro.css">
    <link rel="stylesheet" href="style/global.css">
</head>
<body class="pagina-foro">
    <header>
        <nav>
            <div class="brand">
                <div class="contenedor-logo">
                    <div class="brand-info">
                        <h1>VIAJA LIBRE</h1>
                        <p class="eslogan">Comparte tus viajes</p>
                    </div>
                    <a href="home.html" class="texto-logo" style="text-decoration: none; color: white;">VL</a>
                </div>
            </div>
            <!--Menú de navegación-->
            <div class="nav-links">
                <a href="home.html" class="nav-link">Home</a>
                <a href="foro.html" class="nav-link nav-link-active">Foro</a>
                <a href="otros_rincones.html" class="nav-link">Otros rincones</a> 
            </div>

            <!--Selector de idioma y versión disléxica-->
            <div class="selector-idioma">
                <button id="lang-es" class="lang-btn active">ES</button>
                <button id="lang-en" class="lang-btn">EN</button>
                <button id="dyslexic-btn" class="lang-btn">00</button>
            </div>
        </nav>
    </header>

    <main>
        <!--Mensaje de bienvenida-->
        <div id="forum-notice" class="forum-notice" aria-live="polite"></div>

        <!--Botones de inicio de sesión y registro-->
        <div class="action-buttons-container">
            <a href="login.html" class="action-btn">Iniciar sesión</a>
            <a href="registro.html" class="action-btn">Registrarse</a>
        </div>

        <!--Contenedor principal-->
        <div class="forum-wrapper">
            <section class="forum-header-box">
                <h2 class="forum-title">Foro / Comunidad</h2>
                <p class="forum-subtitle">
                    Explora dudas, recomendaciones y experiencias de otros viajeros.
                </p>
            </section>

            <!--Buscador-->
            <section class="forum-search" aria-labelledby="search-heading">
                <h2 id="search-heading" class="sr-only">Buscar en el foro</h2>
                <div class="search-container">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Buscar" 
                        aria-label="Buscar en los posts"
                    >
                    <button id="searchBtn" aria-label="Buscar">🔍</button>
                </div>
            </section>

            <!--Filtros-->
            <section class="forum-filters" aria-label="Filtros de categoría">
                <!--Filtros para ordenador-->
                <div class="filters-desktop-group">
                    <button class="filter-btn active" data-category="all">Todos</button>
                    <button class="filter-btn" data-category="destinations">Destinos</button>
                    <button class="filter-btn" data-category="tips">Consejos</button>
                    <button class="filter-btn" data-category="buddy">Compañero</button>
                    <button class="filter-btn" data-category="gear">Equipamiento</button>
                </div>

                <!--Filtros para móvil (versión desplegable)-->
                <div class="filters-mobile-group" style="display: none;">
                    <label for="mobileFilterSelect">Filtrar por:</label>
                    <select id="mobileFilterSelect" class="mobile-filter-select">
                        <option value="all">Todos</option>
                        <option value="destinations">Destinos</option>
                        <option value="tips">Consejos</option>
                        <option value="buddy">Compañero</option>
                        <option value="gear">Equipamiento</option>
                    </select>
                </div>
            </section>

            <!--Lista de posts-->
            <section class="posts-section">
                <h3 class="posts-title">Posts</h3>
                <div id="postsList" class="posts-list" aria-live="polite"></div>
            </section>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="faq.html">Preguntas frecuentes</a>
            <a href="contacto.html" >Contacto</a>
            <a href="documentacion.html">Documentación</a>
        </div>
    </footer>

    <script src="script/foro.js"></script>
</body>
</html>
