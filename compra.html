<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compra - VIAJA LIBRE</title>
    <link rel="stylesheet" href="style/compra.css">
</head>
<body>
    <script>
        // Verificación de sesión inmediata - se ejecuta antes de cualquier otro script
        (function() {
            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) {
                const lang = localStorage.getItem('lang') || 'es';
                const mensaje = lang === 'es' 
                    ? 'Debes iniciar sesión para acceder al formulario de compra. Serás redirigido a la página de registro.'
                    : 'You must log in to access the purchase form. You will be redirected to the registration page.';
                alert(mensaje);
                window.location.replace('registro.html');
            }
        })();
    </script>
    <header>
        <nav>
            <div class="contenedor-logo">
                <a href="home_log.html" class="logo-section" style="text-decoration: none; color: inherit;">
                    <h1>VIAJA LIBRE</h1>
                    <p class="eslogan">¡Compra tu viaje!</p>
                </a>
                <a href="home_log.html" class="logo-placeholder" style="text-decoration: none; color: white;">VL</a>
            </div>

            <div class="header-right">
                <div class="language-selector">
                    <button class="lang-btn active" id="lang-es">ES</button>
                    <button class="lang-btn" id="lang-en">EN</button>
                </div>
                <button class="accessibility-btn" id="dyslexic-btn" onclick="toggleDyslexic()">OO</button>
            </div>
        </nav>
    </header>

    <main>
        <div class="main-wrapper">
            <div class="destination-header">
                <h2 id="destination-name">.</h2> 
                <div class="price-tag" id="price-per-person"></div>
            </div>

            <div class="purchase-container">
                <form id="purchaseForm"> 
                    <div class="content-grid">
                        <div class="left-section">
                            <div class="section-box">
                                <div class="section-title">Acompañantes (Opcional)</div>
                                <div class="radio-group">
                                    <label>¿Viajas acompañado? *</label>
                                    <label><input type="radio" name="acompanado" value="si" id="acomp-si"> Sí</label>
                                    <label><input type="radio" name="acompanado" value="no" id="acomp-no"> No</label>
                                </div>
                                <div class="form-row">
                                    <label for="acomp-name" class="sr-only">Nombre y apellido del acompañante</label>
                                    <input type="text" id="acomp-name" placeholder="Nombre, apellido">
                                    
                                    <label for="acomp-email" class="sr-only">Correo electrónico del acompañante</label>
                                    <input type="email" id="acomp-email" placeholder="Correo electrónico">
                                </div>
                                <button type="button" class="add-btn">+ Añadir otro acompañante</button>
                            </div>

                            <div class="section-box">
                                <div class="section-title">Mascotas (Opcional)</div>
                                <div class="radio-group">
                                    <label>¿Viajas con mascota? *</label>
                                    <label><input type="radio" name="mascota" value="si" id="pet-si"> Sí</label>
                                    <label><input type="radio" name="mascota" value="no" id="pet-no"> No</label>
                                </div>
                                <div class="form-row">
                                    <label for="pet-type" class="sr-only">Tipo de mascota</label>
                                    <input type="text" id="pet-type" placeholder="Tipo">
                                    
                                    <label for="pet-size" class="sr-only">Tamaño de la mascota</label>
                                    <input type="text" id="pet-size" placeholder="Tamaño">
                                </div>
                            </div>

                            <div class="section-box">
                                <div class="section-title">Intolerancias / Alergias (Opcional)</div>
                                <label for="intolerances" class="sr-only">Intolerancias o alergias</label>
                                <textarea id="intolerances" placeholder=""></textarea>
                            </div>
                        </div>

                        <div class="right-section">
                            <div class="date-row">
                                <div class="date-group">
                                    <label for="departureDate">Fecha de salida *</label>
                                    <input type="date" class="date-input" id="departureDate">
                                </div>
                                <div class="date-group">
                                    <label for="arrivalDate">Fecha de llegada *</label>
                                    <input type="date" class="date-input" id="arrivalDate">
                                </div>
                            </div>

                            <div class="section-box">
                                <div class="payment-title">Formulario de compra</div>
                                <div class="card-type">
                                    <label for="card-type">Tipo de tarjeta *</label>
                                    <select id="card-type" name="card-type">
                                        <option value="" disabled selected>Selecciona una opción</option>
                                        <option value="visa">Visa</option>
                                        <option value="mastercard">Mastercard</option>
                                        <option value="amex">American Express</option>
                                    </select>
                                </div>
                                <label for="cardNumber" class="sr-only">Número de tarjeta *</label>
                                <input type="text" id="cardNumber" placeholder="Número de tarjeta *" style="margin-bottom: 1rem;">
                                
                                <label for="cardHolder" class="sr-only">Nombre del titular de la tarjeta *</label>
                                <input type="text" id="cardHolder" placeholder="Nombre del titular de la tarjeta *" style="margin-bottom: 1rem;">
                                
                                <div class="form-row">
                                    <label for="expiryDateInput" class="sr-only">Fecha de caducidad (MM/YY) *</label>
                                    <input type="text" id="expiryDateInput" placeholder="Fecha caducidad *">
                                    
                                    <label for="cvvInput" class="sr-only">CVV *</label>
                                    <input type="text" id="cvvInput" placeholder="CVV *">
                                </div>
                                <button type="submit" class="submit-btn">Comprar viaje</button>
                            </div>
                        </div>
                    </div>
                </form> </div>
        </div>
    </main>

    <footer>
        <div class="footer-links">
            <a href="faq_log.html">Preguntas frecuentes</a>
            <a href="contacto_log.html" >Contacto</a>
            <a href="documentacion_log.html">Documentación</a>
        </div>
    </footer>
    <script src="script/compra.js"></script>
    <script src="script/ciudades-data.js"></script>
</body>
</html>
