<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - VIAJA LIBRE</title>
    <link rel="stylesheet" href="style/registro.css">
</head>
<body>
    <header>
    <nav>
        <div class="brand">
            <div class="logo-container">
                <a href="home.html" class="brand-info" style="text-decoration: none; color: inherit;">
                    <h1>VIAJA LIBRE</h1>
                    <p class="eslogan">¡Crea una cuenta nueva!</p>
                </a>
                <a href="home.html" class="logo-text" style="text-decoration: none; color: white;">VL</a>
            </div>
        </div>
        <div class="language-selector">
            <button id="lang-es" class="lang-btn active">ES</button>
            <button id="lang-en" class="lang-btn">EN</button>
            <button id="dyslexic-btn" class="lang-btn">00</button>
        </div>
    </nav>
    </header>

    <main>
        <section class="register-container">
            <h2>REGISTRO</h2>
            <form id="registerForm">
                <div class="form-group">
                    <label for="fullName">Nombre completo *</label>
                    <input type="text" id="fullName" required>
                    <span class="error"></span>
                </div>

                <div class="form-group">
                    <label for="email">correo@gmail.com *</label>
                    <input type="email" id="email" required>
                    <span class="error"></span>
                </div>

                <div class="form-group">
                    <label for="password">Contraseña *</label>
                    <input type="password" id="password" required minlength="8">
                    <span class="error"></span>
                </div>

                <div class="form-group checkbox-group">
                    <label for="privacy">
                        <input type="checkbox" id="privacy" required>
                        <span class="checkbox-text">Acepto la <a href="#">política de privacidad</a></span>
                    </label>
                </div>

                <button type="submit">Crear cuenta</button>
            </form>
        </section>
    </main>
    <footer>
        <div class="footer-links">
            <a href="faq.html">Preguntas frecuentes</a>
            <a href="contacto.html" >Contacto</a>
            <a href="documentacion.html">Documentación</a>
        </div>
    </footer>
    <script src="script/registro.js"></script>
</body>
</html>
